<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="utility.css">
        <title>Audio Sphere</title>
    </head>

    <body>
        <div class="container flex bg-black">
            <div class="left">
                <div class="home bg-grey rounded m-1 p-1">
                    <div class="logo"><img class="invert" src="l1.svg" alt="Spotify"></div>
                    <ul>
                        <li><a class="home-link" href="index.html"><img class="invert" src="h1.svg" alt="home"> Home</a></li>
                        <li><button id="searchToggleBtn" class="searchtoggle" type="button"><img class="invert" src="s1.svg" alt="search"> Search</button></li>
                    </ul>
                    <div id="songSearchPanel" class="songsearchpanel">
                        <input id="songSearchInput" type="search" placeholder="Search songs or artists" aria-label="Search songs or artists" />
                    </div>
                </div>
                <div class="library bg-grey rounded m-1 p-1">
                    <div class="heading">
                        <img class="invert" src="l2.svg" alt=library>
                        <h2>Your Library</h2>

                    </div>
                    <div class="songlist">
                        <ul id="songList">
                            <li>
                                song name
                            </li>
                        </ul>
                    </div>
                    <div class="footer">
                        <div><a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a></div>
                        <div><a href="https://www.spotify.com/in-en/safetyandprivacy/"> <span>Safety & Privacy
                                    Center</span> </a>
                        </div>
                        <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/"><span>Privacy
                                    Policy</span></a>
                        </div>
                        <div>
                            <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
                                <span>Cookies</span>
                            </a>
                        </div>
                        <div>
                            <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                                <span>About Ads</span>
                            </a>
                        </div>
                        <div>
                            <a href="https://www.spotify.com/in-en/accessibility/">
                                <span>Accessibility</span>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
            <div class="right bg-grey rounded">
                <div class="header">
                    <div class="nav">

                        <img class="invert" width="50" height="50"
                            src="https://img.icons8.com/material-rounded/50/back.png" alt="back" />
                        <img class="invert" width="50" height="50"
                            src="https://img.icons8.com/material-rounded/50/forward.png" alt="forward" />
                    </div>
                    <div class="buttons">
                        <button class="signupbtn"> Sign up</button>
                        <button class="loginbtn">Log in</button>
                    </div>
                </div>
                <div class="spotifyplaylist">
                    <h2>Playlist</h2>
                    <div class="dashboard">
                        <section class="panel recentpanel">
                            <div class="panelhead">
                                <h3>Recently Played</h3>
                                <span>Quick access to the songs you opened most recently</span>
                            </div>
                            <ul id="recentList" class="recentlist"></ul>
                        </section>
                        <section class="panel createpanel">
                            <div class="panelhead">
                                <h3>Create Playlist</h3>
                                <span>Name a playlist, switch between them, and add the current song</span>
                            </div>
                            <div class="createbox">
                                <div class="librarycontrols">
                                <input id="libraryNameInput" type="text" placeholder="Library name" />
                                <button id="createLibraryBtn">Create playlist</button>
                                </div>
                                <div class="librarycontrols">
                                <select id="librarySelect"></select>
                                <button id="addToLibraryBtn">Add current song</button>
                                </div>
                            </div>
                            <div id="libraryList" class="librarylist"></div>
                            <div id="selectedLibrarySongs" class="selectedlibrarysongs"></div>
                        </section>
                    </div>
                    <div class="playbar">
                        <div class="songbuttons">
                            <div class="songinfo"></div>
                            <img id="prevBtn" width="50" height="50"
                                src="https://img.icons8.com/ios-glyphs/50/previous.png" alt="previous" />
                            <img id="playBtn" class="invert" width="50" height="50"
                                src="https://img.icons8.com/liquid-glass/50/play.png" alt="play" />
                            <img id="nextBtn" width="50" height="50"
                                src="https://img.icons8.com/forma-light-filled/24/next.png" alt="next" />

                        </div>
                        <input id="seekBar" class="seekbar" type="range" min="0" max="50" value="0"
                            aria-label="Seek song position" />
                        <div id="songTime" class="songtime"></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>

    </body>

</html>
