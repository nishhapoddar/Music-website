<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="utility.css">
        <title>Audio Sphere</title>
    </head>

    <body>
        <div class="container bg-black">
            <div class="app-shell bg-grey rounded">
                <div class="topbar">
                    <div class="logo"><img class="invert" src="l1.svg" alt="Spotify"></div>
                    <div class="topbar-actions">
                        <a class="home-link" href="index.html"><img class="invert" src="h1.svg" alt="home"> Home</a>
                        <button id="searchToggleBtn" class="searchtoggle" type="button"><img class="invert" src="s1.svg" alt="search"> Search</button>
                        <button class="signupbtn" type="button">Sign up</button>
                        <button class="loginbtn" type="button">Log in</button>
                    </div>
                </div>
                <div id="songSearchPanel" class="songsearchpanel">
                    <input id="songSearchInput" type="search" placeholder="Search songs or artists" aria-label="Search songs or artists" />
                </div>
                <div class="content-grid">
                    <section class="library bg-grey rounded p-1">
                        <div class="heading">
                            <img class="invert" src="l2.svg" alt="library">
                            <h2>Your Library</h2>

                        </div>
                        <div class="songlist">
                            <ul id="songList">
                                <li>
                                    song name
                                </li>
                            </ul>
                        </div>
                        <div class="footer">
                            <div><a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a></div>
                            <div><a href="https://www.spotify.com/in-en/safetyandprivacy/"> <span>Safety & Privacy
                                        Center</span> </a>
                            </div>
                            <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/"><span>Privacy
                                        Policy</span></a>
                            </div>
                            <div>
                                <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
                                    <span>Cookies</span>
                                </a>
                            </div>
                            <div>
                                <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                                    <span>About Ads</span>
                                </a>
                            </div>
                            <div>
                                <a href="https://www.spotify.com/in-en/accessibility/">
                                    <span>Accessibility</span>
                                </a>
                            </div>
                        </div>

                    </section>
                    <section class="spotifyplaylist bg-grey rounded">
                        <h2>Playlist</h2>
                        <div class="dashboard">
                            <section class="panel favpanel">
                                <div class="panelhead">
             
                                    <h3>Saved Favorites</h3>
                                    <span>Keep the songs you want to come back to</span>
                                </div>
                                <ul id="favoriteList" class="favoritelist"></ul>
                            </section>
                        </div>
                    </section>
                </div>
            </div>
            <div class="playbar">
                <div class="songbuttons">
                    <div class="songinfo"></div>
                    <img id="prevBtn" width="50" height="50"
                        src="https://img.icons8.com/ios-glyphs/50/previous.png" alt="previous" />
                    <img id="playBtn" class="invert" width="50" height="50"
                        src="https://img.icons8.com/liquid-glass/50/play.png" alt="play" />
                    <img id="nextBtn" width="50" height="50"
                        src="https://img.icons8.com/forma-light-filled/24/next.png" alt="next" />

                </div>
                <input id="seekBar" class="seekbar" type="range" min="0" max="50" value="0"
                    aria-label="Seek song position" />
                <div id="songTime" class="songtime"></div>
            </div>
        </div>
        <script src="script.js"></script>

    </body>

</html>
